name: Trebic events Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - '.github/workflows/trebic-events-pages.yml'
      - 'scripts/update-trebic-events.ps1'
      - 'scripts/publish-trebic-events-site.ps1'
      - 'trebic-events.settings.json'
      - 'README.md'
      - 'data/**'
      - 'docs/**'
      - 'report/**'
  schedule:
    - cron: '0 13 * * *'
    - cron: '15 13 * * *'
    - cron: '30 13 * * *'
    - cron: '45 13 * * *'
    - cron: '0 14 * * *'
    - cron: '15 14 * * *'
    - cron: '30 14 * * *'
    - cron: '45 14 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: trebic-events-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: windows-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run update script
        shell: powershell
        run: .\scripts\update-trebic-events.ps1

      - name: Prepare Pages site
        shell: powershell
        run: .\scripts\publish-trebic-events-site.ps1 -SkipUpdate

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
